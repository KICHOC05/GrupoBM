<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="header">

<!-- Mobile Menu Overlay -->
<div class="mobile-menu-overlay" id="mobileMenuOverlay" onclick="closeMobileMenu()"></div>

<!-- Mobile Menu -->
<div class="mobile-menu" id="mobileMenu">
    <div class="mobile-menu-header">
        <img th:src="@{/img/Logo_Cortes.png}" alt="Grupo BM" class="mobile-menu-logo" onerror="this.style.display='none'">
        <div class="close-menu" onclick="closeMobileMenu()">
            <i class="fas fa-times"></i>
        </div>
    </div>
    <div class="mobile-menu-items">
        <a th:href="@{/}" onclick="closeMobileMenu()"><i class="fas fa-home"></i> Inicio</a>
        <a href="#nosotros" onclick="closeMobileMenu()"><i class="fas fa-building"></i> Nosotros</a>
        <a href="#paquetes" onclick="closeMobileMenu()"><i class="fas fa-box"></i> Servicios</a>
        <a href="#galeria" onclick="closeMobileMenu()"><i class="fas fa-images"></i> Galería</a>
        <a href="#clientes" onclick="closeMobileMenu()"><i class="fas fa-star"></i> Clientes</a>
        <a href="#contacto" onclick="closeMobileMenu()"><i class="fas fa-envelope"></i> Contacto</a>
        <a th:href="@{/blog}" onclick="closeMobileMenu()"><i class="fas fa-newspaper"></i> Blog</a>
        
        <!-- Botón de inicio de sesión para móvil -->
        <a th:href="@{/login}" onclick="closeMobileMenu()" class="login-btn-mobile">
            <i class="fas fa-sign-in-alt"></i> Iniciar sesión
        </a>

        <a href="#contacto" class="cotizar-btn-mobile" onclick="closeMobileMenu()">
            <i class="fas fa-file-invoice"></i> Cotizar Ahora
        </a>
    </div>
    <div class="mobile-menu-footer">
        <div class="social-icons">
            <a href="https://www.facebook.com/share/18UJDsVjrE/?mibextid=wwXIfr" target="_blank"><i class="fab fa-facebook"></i></a>
            <a href="https://instagram.com/grupobm.industrial" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
        </div>
        <p>© 2026 Grupo BM</p>
    </div>
</div>

<!-- Navbar Desktop -->
<nav class="navbar">
    <div class="container">
        <a th:href="@{/}" class="logo-container">
            <img th:src="@{/img/Logo_Cortes.png}" alt="Grupo BM Logo" class="logo-image"
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
            <div class="hidden text-white font-bold text-2xl tracking-tight">GRUPO BM</div>
        </a>
        <ul class="desktop-menu">
            <li><a th:href="@{/}">Inicio</a></li>
            <li><a href="#nosotros">Nosotros</a></li>
            <li><a href="#paquetes">Servicios</a></li>
            <li><a href="#galeria">Galería</a></li>
            <li><a href="#clientes">Clientes</a></li>
            <li><a href="#contacto">Contacto</a></li>
            <li><a th:href="@{/blog}">Blog</a></li>
            <!-- Botón de inicio de sesión para escritorio -->
            <li><a th:href="@{/login}" class="login-btn-desktop"><i class="fas fa-sign-in-alt"></i> Iniciar sesión</a></li>
        </ul>
        <a href="#contacto" class="cotizar-btn-desktop">
            <i class="fas fa-file-invoice"></i> Cotizar
        </a>
        <div class="menu-toggle" id="menuToggle" onclick="toggleMobileMenu()">
            <span></span><span></span><span></span>
        </div>
    </div>
</nav>

</th:block>
</body>
</html>
