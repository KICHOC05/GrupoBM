<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — Grupo BM</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body class="min-h-screen flex items-center justify-center">

    <div class="login-card w-full max-w-md mx-4 bg-white rounded-2xl shadow-2xl overflow-hidden">

        <!-- Header -->
        <div class="bg-[#2C0101] px-8 pt-8 pb-7 text-center relative">
            <div class="absolute bottom-0 left-0 right-0 h-1 bg-[#8B0000]"></div>
            
            <div class="w-16 h-16 rounded-full bg-[#8B0000] flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-industry text-white text-2xl"></i>
            </div>
            
            <h1 class="text-xl font-bold text-white mb-1">Panel Administrativo</h1>
            <p class="text-xs text-white/40 uppercase tracking-widest">Grupo BM</p>
        </div>

        <!-- Body -->
        <div class="px-8 py-8">

            <!-- Alert error -->
            <div id="errorAlert" th:if="${errorMsg}" 
                 class="alert-error flex items-center gap-2 rounded-xl px-4 py-3 mb-5">
                <i class="fas fa-exclamation-circle text-red-500"></i>
                <span th:text="${errorMsg}"></span>
            </div>

            <!-- Alert logout -->
            <div id="successAlert" th:if="${successMsg}" 
                 class="alert-success flex items-center gap-2 rounded-xl px-4 py-3 mb-5">
                <i class="fas fa-check-circle text-green-500"></i>
                <span th:text="${successMsg}"></span>
            </div>

            <!-- Formulario de login - SIN CSRF porque está deshabilitado en SecurityConfig -->
            <form action="/login" method="post" id="loginForm">
                
                <!-- Email -->
                <div class="mb-5">
                    <label for="username" class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2">
                        Correo electrónico
                    </label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm pointer-events-none"></i>
                        <input type="email"
                               id="username"
                               name="username"
                               class="input-field"
                               placeholder="admin@grupobm.com"
                               autocomplete="email"
                               required>
                    </div>
                </div>

                <!-- Contraseña -->
                <div class="mb-6">
                    <label for="password" class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2">
                        Contraseña
                    </label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm pointer-events-none"></i>
                        <input type="password"
                               id="password"
                               name="password"
                               class="input-field"
                               placeholder="••••••••"
                               autocomplete="current-password"
                               required>
                        <button type="button"
                                onclick="togglePassword()"
                                tabindex="-1"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-[#8B0000] transition-colors bg-transparent border-none cursor-pointer">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- Botón submit -->
                <button type="submit"
                        id="loginBtn"
                        class="btn-login w-full bg-[#8B0000] hover:bg-[#2C0101] text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2">
                    <div class="login-spinner" id="loginSpinner"></div>
                    <i class="fas fa-sign-in-alt" id="loginIcon"></i>
                    <span id="loginText">Ingresar al panel</span>
                </button>

            </form>

            <!-- Volver al sitio -->
            <div class="text-center mt-6 pt-5 border-t border-gray-100">
                <a th:href="@{/}"
                   class="text-sm text-gray-400 hover:text-[#8B0000] transition-colors inline-flex items-center gap-2">
                    <i class="fas fa-arrow-left text-xs"></i>
                    Volver al sitio web
                </a>
            </div>
        </div>

        <!-- Footer -->
        <div class="bg-gray-50 border-t border-gray-100 px-8 py-3 text-center text-xs text-gray-400">
            Grupo BM &copy; <span th:text="${#dates.year(#dates.createNow())}">2025</span>
            &nbsp;·&nbsp; Acceso restringido a administradores
        </div>
    </div>

    <!-- Custom JS -->
    <script th:src="@{/js/login.js}"></script>

</body>
</html>
