<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Clientes - Admin Grupo BM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link rel="stylesheet" th:href="@{/css/admin-galeria.css}">
</head>
<body class="bg-gray-100 font-['Inter']">

<div class="admin-wrapper">
    <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{admin/fragments/admin-header :: admin-header}"></div>
        <div class="content-container">
            <div class="page-header">
                <div>
                    <h1 class="page-title">Nuestros Clientes</h1>
                    <p class="page-subtitle">Empresas que confían en nosotros</p>
                </div>
                <a th:href="@{/admin/clientes/nuevo}" class="btn-primary-admin">
                    <i class="fas fa-plus"></i> Nuevo Cliente
                </a>
            </div>

            <div th:if="${exito}" class="alert-admin alert-success-admin" th:text="${exito}"></div>
            <div th:if="${error}" class="alert-admin alert-danger-admin" th:text="${error}"></div>

            <div class="galeria-grid">
                <div th:each="c : ${clientes}" class="galeria-card">
                    <div class="galeria-img-wrapper" style="aspect-ratio: 1 / 0.8;">
                        <img th:src="${c.imagenUrl}" class="galeria-img" style="object-fit: contain; background: white; padding: 1rem;"
                             onerror="this.src='https://via.placeholder.com/200?text=Error'">
                        <div class="galeria-overlay">
                            <a th:href="@{/admin/clientes/editar/{id}(id=${c.id})}" class="btn-overlay edit">
                                <i class="fas fa-edit"></i> Editar
                            </a>
                            <form th:action="@{/admin/clientes/eliminar/{id}(id=${c.id})}" method="post" style="display:inline;">
                                <button type="submit" class="btn-overlay delete" onclick="return confirm('¿Eliminar este cliente?')">
                                    <i class="fas fa-trash"></i> Eliminar
                                </button>
                            </form>
                        </div>
                    </div>
                    <div class="galeria-desc" th:text="${c.nombre}">Nombre del cliente</div>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/admin.js}"></script>
<script th:src="@{/js/admin-galeria.js}"></script>
</body>
</html>
