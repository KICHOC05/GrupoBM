<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Formulario Cliente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link rel="stylesheet" th:href="@{/css/admin-galeria.css}">
</head>
<body class="bg-gray-100 font-['Inter']">

<div class="admin-wrapper">
    <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{admin/fragments/admin-header :: admin-header}"></div>
        <div class="content-container">
            <div class="page-header">
                <h1 class="page-title" th:text="${titulo}">Cliente</h1>
                <a th:href="@{/admin/clientes}" class="btn-secondary-admin"><i class="fas fa-arrow-left"></i> Volver</a>
            </div>

            <form method="post" enctype="multipart/form-data" th:action="@{/admin/clientes/guardar}" class="card-modern formulario-galeria">
                <input type="hidden" name="id" th:value="${clienteDTO.id}">
                <div class="card-body-modern space-y-5">
                    <div class="form-group-modern">
                        <label class="form-label-modern">Nombre del Cliente</label>
                        <input type="text" name="nombre" th:value="${clienteDTO.nombre}" class="form-control-modern" required placeholder="Ej: Empresa Ejemplo S.A.">
                    </div>
                    <div class="form-group-modern">
                        <label class="form-label-modern">Orden (menor número aparece primero)</label>
                        <input type="number" name="orden" th:value="${clienteDTO.orden}" class="form-control-modern" placeholder="0, 1, 2...">
                        <p class="field-hint"><i class="fas fa-info-circle"></i> Las imágenes se ordenan de menor a mayor.</p>
                    </div>
                    <div class="form-group-modern">
                        <label class="form-label-modern">Logo del Cliente</label>
                        <div id="uploadZone" class="upload-zone">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <div class="upload-zone-text">Arrastra y suelta el logo</div>
                            <div class="upload-zone-hint">o haz clic para seleccionar</div>
                            <div class="upload-zone-hint text-xs">JPG, PNG, GIF, WEBP hasta 50MB</div>
                        </div>
                        <input type="file" name="imagenFile" id="imagenFile" accept="image/*" style="display:none;" th:required="${clienteDTO.id == null}">
                        <div id="previewContainer"></div>
                        <p th:if="${clienteDTO.id != null}" class="field-hint text-amber-600 mt-2">
                            <i class="fas fa-info-circle"></i> Dejar en blanco para mantener el logo actual.
                        </p>
                    </div>
                    <div class="flex gap-2 pt-4">
                        <button type="submit" class="btn-primary-admin">Guardar</button>
                        <a th:href="@{/admin/clientes}" class="btn-secondary-admin">Cancelar</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
<script th:src="@{/js/admin.js}"></script>
<script th:src="@{/js/admin-galeria.js}"></script>
</body>
</html>
